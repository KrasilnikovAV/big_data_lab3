name: ci

on:
  pull_request:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          python scripts/train_model.py --config config.ini --output-model artifacts/model.joblib --metrics artifacts/metrics.json --submission artifacts/submission.csv

      - name: Run tests
        run: |
          python -m pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Compute image ref
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKER_PUSH=false" >> "$GITHUB_ENV"
            echo "IMAGE_REF=local/bbc-news-classifier_v3:${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "DOCKER_PUSH=true" >> "$GITHUB_ENV"
            echo "IMAGE_REF=${{ secrets.DOCKERHUB_USERNAME }}/bbc-news-classifier_v3:${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub login
        if: env.DOCKER_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (without push)
        if: env.DOCKER_PUSH == 'false'
        run: docker build -t "$IMAGE_REF" .

      - name: Build and push image
        if: env.DOCKER_PUSH == 'true'
        id: build_and_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bbc-news-classifier_v3:latest

      - name: Install cosign
        if: env.DOCKER_PUSH == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: env.DOCKER_PUSH == 'true'
        run: cosign sign --yes "$IMAGE_REF"

      - name: Generate dev_sec_ops manifest
        run: |
          python scripts/generate_dev_sec_ops.py \
            --output dev_sec_ops.yml \
            --coverage coverage.xml \
            --image "$IMAGE_REF" \
            --digest "${{ steps.build_and_push.outputs.digest }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            artifacts/metrics.json
            artifacts/submission.csv
            coverage.xml
            dev_sec_ops.yml
