[data]
train_path = data/BBC News Train.csv
test_path = data/BBC News Test.csv
text_column = Text
target_column = Category
id_column = ArticleId

[split]
test_size = 0.2
random_state = 42

[vectorizer]
lowercase = true
ngram_min = 1
ngram_max = 2
min_df = 2
max_df = 0.95
sublinear_tf = true

[model]
algorithm = linear_svc
c = 1.0
max_iter = 2000
n_jobs = -1
