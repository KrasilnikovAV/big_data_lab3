services:
  vault-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/bbc-news-classifier_v3:latest
    command: ["python", "scripts/bootstrap_clickhouse.py"]
    volumes:
      - vault_runtime:/vault
      - ./secrets:/run/secrets:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - vault_runtime:/etc/clickhouse-server/users.d

  bbc-news-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/bbc-news-classifier_v3:latest
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"status\":\"ok\"' && curl -fsS http://localhost:8000/health | grep -q '\"database\":\"ok\"'"] # shell
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./secrets:/run/secrets:ro

volumes:
  clickhouse_data:
  vault_runtime:
