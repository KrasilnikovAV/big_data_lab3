services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user $$CLICKHOUSE_USER --password $$CLICKHOUSE_PASSWORD --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  bbc-news-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/bbc-news-classifier_v2:${IMAGE_TAG:-latest}
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/artifacts/model.joblib
      CLICKHOUSE_ENABLED: "true"
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"status\":\"ok\"' && curl -fsS http://localhost:8000/health | grep -q '\"database\":\"ok\"'"] # shell
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  clickhouse_data:
