services:
  vault-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/bbc-news-classifier_v3:latest
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        test -s /run/secrets/.vault_pass.txt || {
          echo "Vault password file is missing or empty: /run/secrets/.vault_pass.txt" >&2
          exit 1
        }
        secrets="$$(ansible-vault view /app/secrets/clickhouse.vault.yml \
          --vault-password-file /run/secrets/.vault_pass.txt)" || {
          echo "Failed to decrypt /app/secrets/clickhouse.vault.yml. Check ANSIBLE_VAULT_PASSWORD." >&2
          exit 1
        }
        user="$$(printf '%s\n' "$$secrets" | awk -F': ' '/^CLICKHOUSE_USER: / {print $$2}')"
        password="$$(printf '%s\n' "$$secrets" | awk -F': ' '/^CLICKHOUSE_PASSWORD: / {print $$2}')"
        test -n "$$user" || {
          echo "CLICKHOUSE_USER was not found in Vault payload." >&2
          exit 1
        }
        test -n "$$password" || {
          echo "CLICKHOUSE_PASSWORD was not found in Vault payload." >&2
          exit 1
        }
        case "$$user" in
          ''|*[!A-Za-z0-9_]*)
            echo "Unsupported CLICKHOUSE_USER value" >&2
            exit 1
            ;;
        esac
        escaped_password="$$(printf '%s' "$$password" \
          | sed -e 's/&/\\&amp;/g' \
                -e 's/</\\&lt;/g' \
                -e 's/>/\\&gt;/g' \
                -e 's/\"/\\&quot;/g' \
                -e "s/'/\\&apos;/g")"
        cat > /vault/clickhouse-user.xml <<EOF
        <clickhouse>
          <users>
            <$$user>
              <password>$$escaped_password</password>
              <profile>default</profile>
              <quota>default</quota>
              <networks>
                <ip>::/0</ip>
              </networks>
              <grants>
                <query>GRANT ALL ON *.*</query>
              </grants>
            </$$user>
          </users>
        </clickhouse>
        EOF
        test -s /vault/clickhouse-user.xml
    volumes:
      - vault_runtime:/vault
      - ./secrets:/run/secrets:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - vault_runtime:/etc/clickhouse-server/users.d

  bbc-news-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/bbc-news-classifier_v3:latest
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"status\":\"ok\"' && curl -fsS http://localhost:8000/health | grep -q '\"database\":\"ok\"'"] # shell
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./secrets:/run/secrets:ro

volumes:
  clickhouse_data:
  vault_runtime:
